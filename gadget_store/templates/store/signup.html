{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Join F.B Nation{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="bg-white rounded-xl p-5 shadow-sm">
                <div class="text-center mb-4">
                    <h2 style="font-family:'Syne',sans-serif;font-weight:800;" class="mb-1">Create Account</h2>
                    <p class="text-muted">Join the <strong>F.B Nation</strong> community today</p>
                </div>

                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    
                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-primary-custom btn-lg">
                            Create My Account
                        </button>
                    </div>
                </form>

                <div class="text-center mt-4 pt-3 border-top">
                    <p class="text-muted small">
                        Already have an account? 
                        <a href="{% url 'login' %}" class="text-primary fw-bold text-decoration-none">Login here</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
