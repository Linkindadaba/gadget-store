{% extends 'base.html' %}
{% block title %}Help & Support - F.B Nation{% endblock %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <h1 style="font-family:'Syne',sans-serif;font-weight:800">Help & Support</h1>
      <div class="accent-bar mb-4"></div>
      <div class="bg-white rounded-xl shadow-sm p-4">
        <p class="text-muted">Need help with an order, payment, delivery, or return? Reach F.B Nation support through any of the channels below.</p>
        <div class="row g-3 mt-2">
          <div class="col-md-6">
            <a class="btn btn-outline-dark rounded-pill w-100 fw-semibold" href="mailto:support@fbnation.com">
              <i class="bi bi-envelope me-2"></i>Email Support
            </a>
          </div>
          <div class="col-md-6">
            <a class="btn btn-primary-custom w-100" href="https://wa.me/233000000000">
              <i class="bi bi-whatsapp me-2"></i>WhatsApp Support
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
