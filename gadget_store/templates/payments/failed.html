{% extends 'base.html' %}
{% block title %}Payment Failed - TechHub Ghana{% endblock %}
{% block content %}
<div class="container py-5 text-center">
  <div style="font-size:5rem">❌</div>
  <h2 style="font-family:'Syne',sans-serif;font-weight:800" class="mt-3">Payment Failed</h2>
  <p class="text-muted">Something went wrong with your payment for order <strong>#{{ order.order_number }}</strong>.</p>
  <div class="d-flex justify-content-center gap-3 mt-4">
    <a href="{% url 'payments:initiate' order.id %}" class="btn btn-primary-custom btn-lg">Try Again</a>
    <a href="{% url 'store:home' %}" class="btn btn-outline-secondary btn-lg">Go Home</a>
  </div>
</div>
{% endblock %}
